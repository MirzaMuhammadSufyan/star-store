name: Build and Deploy (Cloudflare Pages - npm install)

# This workflow forces `npm install` (instead of `npm ci`) to avoid lockfile mismatch
# issues in build environments that run `npm ci` by default. It builds the site and
# deploys to Cloudflare Pages using the official Pages Action.
#
# Required repository secrets:
# - CLOUDFLARE_API_TOKEN (API token with Pages permissions)
# - CLOUDFLARE_ACCOUNT_ID
# - CLOUDFLARE_PAGES_PROJECT_NAME

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (uses npm install)
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          directory: './dist'
